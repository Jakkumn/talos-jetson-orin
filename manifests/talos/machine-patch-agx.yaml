# Talos machine config patch — AGX Orin test setup
#
# Variant: feat/oe4t-drm-test (no shim, with tegra-drm + host1x-nvhost).
machine:
  install:
    disk: /dev/nvme0n1
    image: ghcr.io/schwankner/custom-installer:v1.13.0-6.18.24-nvgpu5.11.1-drm-noshim
    wipe: true
  kernel:
    modules:
      - name: host1x
      - name: host1x_fence
      - name: host1x_nvhost
      - name: tegra_drm
      # nvhost_ctrl_shim REMOVED in this build variant (feat/oe4t-drm-test)
      - name: nvmap
      - name: mc_utils
      - name: nvgpu
      - name: governor_pod_scaling
