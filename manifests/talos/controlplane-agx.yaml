machine:
    type: controlplane
    token: vjkrwu.64gewt8jghhbezvz
    ca:
        crt: 
        key: LS0tLS1CRUdJTiBFRDI1NTE5IFBSSVZBVEUgS0VZLS0tLS0KTUM0Q0FRQXdCUVlESzJWd0JDSUVJSHRUa201L2pXM0JvMmphRTd2cnpXVEcrSFFWYkJEbEhtNGhFZTJJZkwxeAotLS0tLUVORCBFRDI1NTE5IFBSSVZBVEUgS0VZLS0tLS0K
    certSANs: []
    kubelet:
        image: ghcr.io/siderolabs/kubelet:v1.35.2
        defaultRuntimeSeccompProfileEnabled: true
        disableManifestsDirectory: true
    network: {}
    install:
        disk: /dev/nvme0n1
        image: ghcr.io/schwankner/custom-installer:v1.13.0-6.18.24-nvgpu5.10.10
        wipe: true
    files:
        - content: |
            version = 3

            disabled_plugins = [
                "io.containerd.differ.v1.erofs",
                "io.containerd.internal.v1.tracing",
                "io.containerd.snapshotter.v1.blockfile",
                "io.containerd.snapshotter.v1.erofs",
                "io.containerd.ttrpc.v1.otelttrpc",
                "io.containerd.tracing.processor.v1.otlp",
            ]

            imports = [
                "/etc/cri/conf.d/cri.toml",
            ]

            [debug]
            level = "info"
            format = "json"

            # CDI support for nvidia.com/gpu extended resource.
            # Spec dir /var/run/cdi is populated by the nvidia-cdi-setup DaemonSet.
            # enable_cdi must be set explicitly — Talos builds containerd with CDI
            # disabled in the default config.
            [plugins."io.containerd.cri.v1.runtime"]
              enable_cdi = true
              cdi_spec_dirs = ["/var/run/cdi"]
          permissions: 0o644
          path: /etc/cri/containerd.toml
          op: overwrite
    features:
        diskQuotaSupport: true
        kubePrism:
            enabled: true
            port: 7445
        hostDNS:
            enabled: true
            forwardKubeDNSToHost: true
    kernel:
        modules:
            - name: host1x
            - name: host1x_fence
            - name: nvhost_ctrl_shim
            - name: nvmap
            - name: mc_utils
            - name: nvgpu
            - name: governor_pod_scaling
    nodeLabels:
        accelerator: jetson-orin
        node.kubernetes.io/exclude-from-external-load-balancers: ""
        nvidia.com/gpu.type: igpu
